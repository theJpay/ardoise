name: CI

on:
    push:
        branches: [main, beta]
    pull_request:
        branches: [main, beta]

jobs:
    checks:
        name: Lint, typecheck, build, test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build (includes typecheck)
              run: npm run build

            - name: Test
              run: npm test -- --run
